<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDL - Guía de Pasajero</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-container">
      <header class="viva-header">
        <h1>VivaMap <span>Navegación Interactiva</span></h1>
      </header>

      <section class="viva-widget">
        <nav class="filter-tabs" id="filter-bar">
          <button class="filter-tab active" data-category="todos">Todos</button>
          <button class="filter-tab" data-category="aeropuerto">
            Aeropuerto
          </button>
          <button class="filter-tab" data-category="renta-autos">Autos</button>
          <button class="filter-tab" data-category="autoservicio">
            Tiendas
          </button>
          <button class="filter-tab" data-category="paqueteria">Envíos</button>
          <button class="filter-tab" data-category="seguridad">
            Seguridad
          </button>
          <button class="filter-tab" data-category="transporte">
            Traslados
          </button>
        </nav>

        <div class="poi-info-panel" id="poi-detail">
          <div class="info-bloque principal">
            <span class="etiqueta">Punto de Interés</span>
            <h2 id="poi-name">Selecciona un punto en el mapa</h2>
            <p id="poi-category">---</p>
          </div>
          <div class="info-bloque estadisticas">
            <div class="stat">
              <span class="etiqueta">Espera en sitio</span>
              <strong id="wait-time">--</strong>
            </div>
            <div class="stat">
              <span class="etiqueta">Tiempo de caminata</span>
              <strong id="walk-time">--</strong>
            </div>
          </div>
          <div class="info-bloque accion">
            <button class="viva-btn-red action-btn" disabled>
              Trazar Ruta
            </button>
          </div>
        </div>
      </section>

      <section class="map-viewport" id="map-container">
        <div class="map-wrapper">
          <img
            src="/assets/plano-gadl-airport.png"
            alt="Plano Aeropuerto"
            id="airport-map"
          />
          <div id="pins-layer"></div>
        </div>
      </section>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
