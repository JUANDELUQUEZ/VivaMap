<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDL - Guía de Pasajero</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-container">
      <header class="viva-header">
        <h1>VivaMap <span>Navegación Interactiva</span></h1>
      </header>

      <section class="viva-widget">
        <div class="route-planner">
          <div class="input-group">
            <label for="origen-select">Origen</label>
            <select id="origen-select">
              <option value="" disabled selected>¿Dónde estás?</option>
            </select>
          </div>

          <div class="input-separator">⇄</div>

          <div class="input-group">
            <label for="destino-select">Destino</label>
            <select id="destino-select">
              <option value="" disabled selected>¿A dónde vas?</option>
            </select>
          </div>
        </div>
      </section>

      <section class="map-viewport" id="map-container">
        <div class="map-wrapper">
          <img
            src="./assets/plano-gadl-airport.png"
            alt="Plano Aeropuerto"
            id="airport-map"
          />
          <div id="pins-layer"></div>
        </div>
        <div class="action-bottom-container">
          <button class="viva-btn-red action-btn" id="btn-trazar" disabled>
            Trazar Ruta
          </button>
        </div>
      </section>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
